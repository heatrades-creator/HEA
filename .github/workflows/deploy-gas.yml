name: Deploy Google Apps Scripts

on:
  push:
    branches: [main]
    paths:
      - 'HEA INTAKE/**'
      - 'GAS/**'
      - 'HEA SA/**'

jobs:
  # ── Deploy HEA Solar Intake Form ──────────────────────────────────────────
  deploy-intake:
    name: Push HEA Solar Intake Form
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp (latest)
        run: npm install -g @google/clasp

      - name: Write credentials to all possible locations
        run: |
          set -e
          TOKEN='${{ secrets.CLASPRC_JSON }}'

          echo "=== clasp version ==="
          clasp --version

          echo "=== Token top-level keys ==="
          echo "$TOKEN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(list(d.keys()))"

          # Write the raw token to every location clasp might check
          echo "$TOKEN" > ~/.clasprc.json

          mkdir -p ~/.config/clasp
          echo "$TOKEN" > ~/.config/clasp/default.json

          mkdir -p ~/.config/@google/clasp
          echo "$TOKEN" > ~/.config/@google/clasp/credentials.json

          # Also try the XDG config dir
          mkdir -p "${XDG_CONFIG_HOME:-$HOME/.config}/clasp"
          echo "$TOKEN" > "${XDG_CONFIG_HOME:-$HOME/.config}/clasp/credentials.json"

          echo "=== Credentials written to all locations ==="
          ls -la ~/.clasprc.json ~/.config/clasp/ ~/.config/@google/clasp/ 2>/dev/null || true

      - name: Verify authentication
        run: |
          set -e
          echo "=== Testing clasp auth (whoami) ==="
          clasp whoami || echo "whoami failed — check token"

      - name: Push to Google Apps Script
        working-directory: 'HEA INTAKE'
        run: |
          set -xe
          echo "=== .clasp.json ==="
          cat .clasp.json
          echo "=== Pushing... ==="
          clasp push --force
          echo "=== Push complete ==="

  # ── Deploy HEA Jobs API ───────────────────────────────────────────────────
  deploy-jobs-api:
    name: Push HEA Jobs API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp (latest)
        run: npm install -g @google/clasp

      - name: Write credentials to all possible locations
        run: |
          set -e
          TOKEN='${{ secrets.CLASPRC_JSON }}'
          echo "$TOKEN" > ~/.clasprc.json
          mkdir -p ~/.config/@google/clasp
          echo "$TOKEN" > ~/.config/@google/clasp/credentials.json
          mkdir -p ~/.config/clasp
          echo "$TOKEN" > ~/.config/clasp/credentials.json

      - name: Skip if script ID not set
        working-directory: GAS
        run: |
          if grep -q "REPLACE_WITH_JOBS_API_SCRIPT_ID" .clasp.json; then
            echo "Jobs API script ID not configured — skipping"
            exit 0
          fi

      - name: Push to Google Apps Script
        working-directory: GAS
        run: |
          if ! grep -q "REPLACE_WITH_JOBS_API_SCRIPT_ID" .clasp.json; then
            set -xe
            clasp push --force
          fi

  # ── Deploy HEA Battery Photo Portal ──────────────────────────────────────
  deploy-photo-portal:
    name: Push HEA Battery Photo Portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp (latest)
        run: npm install -g @google/clasp

      - name: Write credentials to all possible locations
        run: |
          set -e
          TOKEN='${{ secrets.CLASPRC_JSON }}'
          echo "$TOKEN" > ~/.clasprc.json
          mkdir -p ~/.config/@google/clasp
          echo "$TOKEN" > ~/.config/@google/clasp/credentials.json
          mkdir -p ~/.config/clasp
          echo "$TOKEN" > ~/.config/clasp/credentials.json

      - name: Push and deploy to Google Apps Script
        working-directory: GAS/PhotoPortal
        run: |
          set -xe
          echo "=== .clasp.json ==="
          cat .clasp.json
          echo "=== Pushing code… ==="
          clasp push --force
          echo "=== Creating new version and updating deployment… ==="
          clasp deploy -i "AKfycbwERmJbdTrnpM_-ABgXGtRolMCzSG2nDWJNyJjhfDx-baSI1BJWiehTdCM9qW0VSWU" \
            --description "Auto-deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "=== PhotoPortal deploy complete — live immediately ==="

  # ── Deploy HEA Solar Analyser ─────────────────────────────────────────────
  deploy-solar-analyser:
    name: Push HEA Solar Analyser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp (latest)
        run: npm install -g @google/clasp

      - name: Write credentials to all possible locations
        run: |
          set -e
          TOKEN='${{ secrets.CLASPRC_JSON }}'
          echo "$TOKEN" > ~/.clasprc.json
          mkdir -p ~/.config/@google/clasp
          echo "$TOKEN" > ~/.config/@google/clasp/credentials.json
          mkdir -p ~/.config/clasp
          echo "$TOKEN" > ~/.config/clasp/credentials.json

      - name: Push and deploy to Google Apps Script
        working-directory: 'HEA SA'
        run: |
          set -xe
          echo "=== .clasp.json ==="
          cat .clasp.json
          echo "=== Pushing HEA Solar Analyser... ==="
          clasp push --force
          echo "=== Creating new version and updating deployment… ==="
          DEPLOY_ID=$(clasp deployments 2>&1 | grep -v "@HEAD" | grep -oE 'AK[A-Za-z0-9_-]+' | head -1)
          if [ -n "$DEPLOY_ID" ]; then
            clasp deploy -i "$DEPLOY_ID" --description "Auto-deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            clasp deploy --description "Auto-deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          echo "=== Solar Analyser deploy complete — live immediately ==="
