name: Deploy Google Apps Scripts

on:
  push:
    branches: [main]
    paths:
      - 'HEA INTAKE/**'
      - 'GAS/**'
      - 'HEA SA/**'

# Shared credential-write script used by every job
# Each job writes creds then runs clasp push --force + clasp deploy
# clasp deploy -i <id> updates the EXISTING live deployment (new version, same URL)
# If no existing deployment exists yet, it creates the first one.
# This means zero manual steps in GAS — push to main = live immediately.

jobs:
  # ── Deploy HEA Solar Intake Form ──────────────────────────────────────────
  deploy-intake:
    name: Push HEA Solar Intake Form
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write credentials
        run: |
          set -e
          TOKEN='${{ secrets.CLASPRC_JSON }}'
          clasp --version
          echo "$TOKEN" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Token keys:', list(d.keys()))"
          echo "$TOKEN" > ~/.clasprc.json
          mkdir -p ~/.config/clasp ~/.config/@google/clasp "${XDG_CONFIG_HOME:-$HOME/.config}/clasp"
          echo "$TOKEN" > ~/.config/clasp/default.json
          echo "$TOKEN" > ~/.config/@google/clasp/credentials.json
          echo "$TOKEN" > "${XDG_CONFIG_HOME:-$HOME/.config}/clasp/credentials.json"
          clasp whoami || echo "whoami check — verify token if this failed"

      - name: Push and deploy
        working-directory: 'HEA INTAKE'
        run: |
          set -xe
          cat .clasp.json
          echo "=== Pushing code ==="
          clasp push --force
          echo "=== Updating live deployment (no manual GAS step needed) ==="
          DEPLOY_ID=$(clasp deployments 2>&1 | grep -v "@HEAD" | grep -oE 'AK[A-Za-z0-9_-]+' | head -1)
          if [ -n "$DEPLOY_ID" ]; then
            echo "Updating deployment: $DEPLOY_ID"
            clasp deploy -i "$DEPLOY_ID" --description "Auto-deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            echo "No existing deployment found — creating first deployment"
            clasp deploy --description "Auto-deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          echo "=== HEA Intake live immediately ==="

  # ── Deploy HEA Jobs API ───────────────────────────────────────────────────
  deploy-jobs-api:
    name: Push HEA Jobs API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write credentials
        run: |
          set -e
          TOKEN='${{ secrets.CLASPRC_JSON }}'
          echo "$TOKEN" > ~/.clasprc.json
          mkdir -p ~/.config/@google/clasp ~/.config/clasp
          echo "$TOKEN" > ~/.config/@google/clasp/credentials.json
          echo "$TOKEN" > ~/.config/clasp/credentials.json

      - name: Push and deploy
        working-directory: GAS
        run: |
          if grep -q "REPLACE_WITH" .clasp.json; then
            echo "Jobs API script ID not configured — skipping"
            exit 0
          fi
          set -xe
          cat .clasp.json
          echo "=== Pushing code ==="
          clasp push --force
          echo "=== Updating live deployment ==="
          DEPLOY_ID=$(clasp deployments 2>&1 | grep -v "@HEAD" | grep -oE 'AK[A-Za-z0-9_-]+' | head -1)
          if [ -n "$DEPLOY_ID" ]; then
            clasp deploy -i "$DEPLOY_ID" --description "Auto-deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            clasp deploy --description "Auto-deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          echo "=== HEA Jobs API live immediately ==="

  # ── Deploy HEA Battery Photo Portal ──────────────────────────────────────
  deploy-photo-portal:
    name: Push HEA Battery Photo Portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write credentials
        run: |
          set -e
          TOKEN='${{ secrets.CLASPRC_JSON }}'
          echo "$TOKEN" > ~/.clasprc.json
          mkdir -p ~/.config/@google/clasp ~/.config/clasp
          echo "$TOKEN" > ~/.config/@google/clasp/credentials.json
          echo "$TOKEN" > ~/.config/clasp/credentials.json

      - name: Push and deploy
        working-directory: GAS/PhotoPortal
        run: |
          set -xe
          cat .clasp.json
          echo "=== Pushing code ==="
          clasp push --force
          echo "=== Updating live deployment ==="
          clasp deploy -i "AKfycbwERmJbdTrnpM_-ABgXGtRolMCzSG2nDWJNyJjhfDx-baSI1BJWiehTdCM9qW0VSWU" \
            --description "Auto-deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "=== PhotoPortal live immediately ==="

  # ── Deploy HEA Solar Analyser ─────────────────────────────────────────────
  deploy-solar-analyser:
    name: Push HEA Solar Analyser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write credentials
        run: |
          set -e
          TOKEN='${{ secrets.CLASPRC_JSON }}'
          echo "$TOKEN" > ~/.clasprc.json
          mkdir -p ~/.config/@google/clasp ~/.config/clasp
          echo "$TOKEN" > ~/.config/@google/clasp/credentials.json
          echo "$TOKEN" > ~/.config/clasp/credentials.json

      - name: Push and deploy
        working-directory: 'HEA SA'
        run: |
          set -xe
          cat .clasp.json
          echo "=== Pushing code ==="
          clasp push --force
          echo "=== Updating live deployment ==="
          clasp deploy -i "AKfycbzZuPvjN6yzPbXUk4OajTLFbDoTMjrxqPgAWqsqJuZAqXfqHhdEsAJ8v1_MOD931nc" \
            --description "Auto-deploy $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "=== HEA Solar Analyser live immediately ==="
