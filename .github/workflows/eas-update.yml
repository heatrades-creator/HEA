name: EAS Update (OTA)

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'

jobs:
  update:
    name: Push OTA update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Push EAS update
        working-directory: mobile
        run: npx eas-cli update --branch preview --message "Auto update from main" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
